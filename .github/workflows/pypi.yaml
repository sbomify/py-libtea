name: Build and Publish to PyPI

on:
  push:
    branches:
      - master
  release:
    types: [published]

jobs:
  build-and-publish-testpypi:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    environment:
      name: testpypi
      url: https://test.pypi.org/p/libtea
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0

      - name: Generate SBOM (PEP 770)
        uses: sbomify/sbomify-action@master
        env:
          TOKEN: ${{ secrets.SBOMIFY_STAGE_TOKEN }}
          API_BASE_URL: 'https://stage.sbomify.com'
          COMPONENT_ID: 'rw6sHZjLbrDb'
          COMPONENT_NAME: 'libtea'
          LOCK_FILE: uv.lock
          SBOM_FORMAT: cyclonedx
          OUTPUT_FILE: libtea.cdx.json
          AUGMENT: "true"
          ENRICH: "true"
          UPLOAD: "false"

      - name: Determine version
        id: version
        run: |
          BASE_VERSION=$(grep '^version' pyproject.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          DEV_VERSION="${BASE_VERSION}.dev${GITHUB_RUN_NUMBER}"
          echo "version=${DEV_VERSION}" >> "$GITHUB_OUTPUT"

      - name: Set dev version
        run: |
          sed -i "s/^version = .*/version = \"${{ steps.version.outputs.version }}\"/" pyproject.toml

      - name: Build package
        run: uv build

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
        with:
          repository-url: https://test.pypi.org/legacy/

  build-and-publish-pypi:
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/libtea
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0

      - name: Generate SBOM (PEP 770)
        uses: sbomify/sbomify-action@master
        env:
          TOKEN: ${{ secrets.SBOMIFY_TOKEN }}
          COMPONENT_ID: 'Xt5ZkVk3DSST'
          COMPONENT_NAME: 'libtea'
          LOCK_FILE: uv.lock
          SBOM_FORMAT: cyclonedx
          OUTPUT_FILE: libtea.cdx.json
          AUGMENT: "true"
          ENRICH: "true"
          UPLOAD: "false"

      - name: Run tests
        run: |
          uv sync --extra cli
          uv run pytest --cov-fail-under=90

      - name: Build package
        run: uv build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
