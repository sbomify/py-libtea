name: Upload SBOM

on:
  push:
    branches: [master]
    tags: [v*.*]

jobs:
  upload-sbom-staging:
    name: Upload SBOM (staging)
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
      attestations: write
    steps:
      - uses: actions/checkout@v6

      - name: Generate and Upload SBOM
        uses: sbomify/sbomify-action@master
        env:
          TOKEN: ${{ secrets.SBOMIFY_STAGE_TOKEN }}
          API_BASE_URL: 'https://stage.sbomify.com'
          COMPONENT_ID: 'rw6sHZjLbrDb'
          COMPONENT_NAME: 'py-libtea'
          COMPONENT_VERSION: ${{ format('{0}-{1}', github.ref_name, github.sha) }}
          LOCK_FILE: 'uv.lock'
          AUGMENT: true
          ENRICH: true
          OUTPUT_FILE: sbom.cdx.json

      - name: Attest SBOM
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: '${{ github.workspace }}/sbom.cdx.json'

  upload-sbom-production:
    name: Upload SBOM (production)
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
      attestations: write
    steps:
      - uses: actions/checkout@v6

      - name: Generate and Upload SBOM
        uses: sbomify/sbomify-action@master
        env:
          TOKEN: ${{ secrets.SBOMIFY_TOKEN }}
          COMPONENT_ID: 'Xt5ZkVk3DSST'
          COMPONENT_NAME: 'py-libtea'
          COMPONENT_VERSION: ${{ github.ref_name }}
          LOCK_FILE: 'uv.lock'
          AUGMENT: true
          ENRICH: true
          OUTPUT_FILE: sbom.cdx.json

      - name: Attest SBOM
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: '${{ github.workspace }}/sbom.cdx.json'
